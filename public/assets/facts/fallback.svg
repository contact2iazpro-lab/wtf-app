<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 880" width="680" height="880">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1" gradientTransform="rotate(160, 0.5, 0.5)">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.133"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="880" fill="url(#bg)"/>

  <!-- WTF! watermark -->
  <text
    x="340" y="220"
    text-anchor="middle"
    font-family="'Nunito', system-ui, sans-serif"
    font-size="90"
    font-weight="900"
    fill="white"
    fill-opacity="0.25"
    letter-spacing="4">WTF!</text>

  <!-- Big question mark -->
  <text
    x="340" y="370"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Nunito', system-ui, sans-serif"
    font-size="110"
    font-weight="900"
    fill="white">?</text>

  <!-- Separator 1 -->
  <line x1="80" y1="430" x2="600" y2="430" stroke="white" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Main text -->
  <text
    x="340" y="490"
    text-anchor="middle"
    font-family="'Nunito', system-ui, sans-serif"
    font-size="22"
    font-weight="700"
    fill="white"
    letter-spacing="1">CE FAIT EST SI INCROYABLE</text>

  <!-- Secondary text line 1 -->
  <text
    x="340" y="534"
    text-anchor="middle"
    font-family="'Nunito', system-ui, sans-serif"
    font-size="18"
    font-weight="400"
    fill="white"
    fill-opacity="0.85">qu'on n'a pas encore trouvé</text>

  <!-- Secondary text line 2 -->
  <text
    x="340" y="566"
    text-anchor="middle"
    font-family="'Nunito', system-ui, sans-serif"
    font-size="18"
    font-weight="400"
    fill="white"
    fill-opacity="0.85">une image à la hauteur...</text>

  <!-- Separator 2 -->
  <line x1="80" y1="610" x2="600" y2="610" stroke="white" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Subtle bottom text -->
  <text
    x="340" y="650"
    text-anchor="middle"
    font-family="'Nunito', system-ui, sans-serif"
    font-size="14"
    font-weight="400"
    fill="white"
    fill-opacity="0.6">Image bientôt disponible</text>
</svg>
