server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Admin SPA
    location /admin {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;
    }

    # Game SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
